name: CI Test and Deploy

on:
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Fix requirements.txt encoding (UTF-16 -> UTF-8)
      run: |
        python -c "
        with open('requirements.txt', 'rb') as f: raw = f.read()
        if raw[:2] == b'\xff\xfe' or (len(raw) > 1 and raw[1:2] == b'\x00'):
            text = raw.decode('utf-16-le')
            with open('requirements.txt', 'w', encoding='utf-8') as f: f.write(text)
            print('Converted UTF-16 to UTF-8')
        "

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-json-report locust requests

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: "3.34.97.68"
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/Flask_Api_Server
          git fetch --all
          git reset --hard origin/main
          # requirements.txt UTF-16 -> UTF-8 변환 (Windows 저장 이슈)
          python3 -c "
          with open('requirements.txt', 'rb') as f: raw = f.read()
          if raw[:2] == b'\xff\xfe' or (len(raw) > 1 and raw[1:2] == b'\x00'):
              text = raw.decode('utf-16-le')
              with open('requirements.txt', 'w', encoding='utf-8') as f: f.write(text)
              print('Converted UTF-16 to UTF-8')
          "
          source venv/bin/activate
          pip install -r requirements.txt
          flask db upgrade
          sudo fuser -k 5000/tcp || true
          pm2 delete typing-server || true
          pm2 start "gunicorn -w 4 -b 0.0.0.0:5000 --timeout 120 --max-requests 1000 --max-requests-jitter 50 'run:app'" --name typing-server --no-autorestart --update-env

    - name: Wait for Server Restart
      run: sleep 30

    - name: Post-deployment Check (Pytest)
      env:
        PYTHONPATH: .
        DATABASE_URL: "sqlite:///:memory:"
        FLASK_ENV: testing
      run: |
        pytest --json-report --json-report-file=result.json

    - name: Cleanup Test User Before Load Test (EC2)
      uses: appleboy/ssh-action@master
      with:
        host: "3.34.97.68"
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/Flask_Api_Server
          source venv/bin/activate
          export DATABASE_URL="${{ secrets.DATABASE_URL }}"
          export LOCUST_TEST_USER_ID="${{ secrets.LOCUST_TEST_USER_ID }}"
          export FLASK_ENV=production
          export PYTHONPATH=.
          python cleanup_test_data.py --keep 100 || true
          echo "✅ 부하테스트 유저 기록 최근 100개만 유지"

    - name: Run Load Test on EC2 (localhost)
      uses: appleboy/ssh-action@master
      with:
        host: "3.34.97.68"
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/Flask_Api_Server
          source venv/bin/activate
          
          # Locust 실행 (localhost로 요청)
          echo "🚀 EC2 내부에서 Locust 부하 테스트 시작 (localhost:5000)"
          echo "📋 현재 디렉토리: $(pwd)"
          echo "📋 Locust 파일 확인: $(ls -la tests/load/locustfile.py 2>&1 || echo '파일 없음')"
          echo "📋 Locust 버전: $(locust --version 2>&1 || echo 'Locust 미설치')"
          
          # Locust 실행 (에러도 출력)
          locust -f tests/load/locustfile.py \
            --headless \
            -u 30 \
            -r 5 \
            --run-time 20s \
            --csv /tmp/perf \
            --host http://localhost:5000 2>&1 | tee /tmp/locust_output.log || {
            echo "❌ Locust 실행 실패"
            cat /tmp/locust_output.log || true
            LOCUST_EXIT_CODE=$?
            echo "Exit code: $LOCUST_EXIT_CODE"
          }
          
          # 결과 파일 확인
          echo "📁 생성된 파일 확인:"
          ls -la /tmp/perf* 2>&1 || echo "파일 없음"
          
          # 결과 파일을 특정 위치에 저장
          if [ -f /tmp/perf_stats.csv ]; then
            mv /tmp/perf_stats.csv /tmp/locust_results.csv
            echo "✅ Locust 결과 파일 생성 완료: /tmp/locust_results.csv"
            echo "📊 파일 크기: $(wc -l < /tmp/locust_results.csv) lines"
          else
            echo "⚠️ Locust 결과 파일이 생성되지 않았습니다."
            echo "🔍 Locust 출력 로그:"
            cat /tmp/locust_output.log 2>&1 || echo "로그 파일 없음"
            # 빈 파일 생성 (scp 에러 방지)
            touch /tmp/locust_results.csv
            echo "Type,Name,Request Count,Failure Count" > /tmp/locust_results.csv
            echo ",Aggregated,0,0" >> /tmp/locust_results.csv
            echo "⚠️ 빈 결과 파일 생성 (부하테스트 실패)"
          fi

    - name: Download Locust Results from EC2
      uses: appleboy/ssh-action@master
      with:
        host: "3.34.97.68"
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 파일 존재 및 권한 확인
          RESULT_FILE="/home/ubuntu/locust_results.csv"
          if [ -f /tmp/locust_results.csv ]; then
            echo "✅ 파일 존재 확인: /tmp/locust_results.csv"
            ls -lh /tmp/locust_results.csv
            # 파일 내용 확인 (처음 몇 줄)
            head -5 /tmp/locust_results.csv
            # 파일을 홈 디렉토리로 복사 (절대 경로 사용)
            cp /tmp/locust_results.csv "$RESULT_FILE"
            chmod 644 "$RESULT_FILE"
            echo "✅ 파일 복사 완료: $RESULT_FILE"
            ls -lh "$RESULT_FILE"
          else
            echo "⚠️ 파일이 없습니다. 빈 파일 생성 중..."
            echo "Type,Name,Request Count,Failure Count" > "$RESULT_FILE"
            echo ",Aggregated,0,0" >> "$RESULT_FILE"
            chmod 644 "$RESULT_FILE"
            echo "✅ 빈 파일 생성 완료: $RESULT_FILE"
          fi

    - name: Download File via SSH
      id: download_file
      uses: appleboy/ssh-action@master
      with:
        host: "3.34.97.68"
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          if [ -f /home/ubuntu/locust_results.csv ]; then
            cat /home/ubuntu/locust_results.csv
          else
            echo "Type,Name,Request Count,Failure Count"
            echo ",Aggregated,0,0"
          fi
        capture_stdout: true
    - name: Save Performance Stats
      run: |
        echo "${{ steps.download_file.outputs.stdout }}" > perf_stats.csv
        echo "✅ 파일 저장 완료: perf_stats.csv"
        echo "📊 파일 크기: $(wc -l < perf_stats.csv) lines"
        head -3 perf_stats.csv || true

    - name: Send Combined Report
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        INTERNAL_SYNC_KEY: ${{ secrets.INTERNAL_SYNC_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        SERVER_URL: ${{ secrets.SERVER_URL }}
        LOCUST_TEST_USER_ID: ${{ secrets.LOCUST_TEST_USER_ID }}
        FLASK_ENV: production
        PYTHONPATH: .
      run: |
        python -c "from save_report import send_combined_report; send_combined_report()" > debug.log 2>&1 || true
        echo "=== DEBUG LOG START ==="
        cat debug.log
        echo "=== DEBUG LOG END ==="
        # 실제 에러만 감지 (FATAL, 실패, 전송 실패 등)
        if grep -qiE "(FATAL|실패|전송 실패|치명적)" debug.log; then exit 1; fi

    - name: Cleanup Test Data on EC2
      uses: appleboy/ssh-action@master
      with:
        host: "3.34.97.68"
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/Flask_Api_Server
          source venv/bin/activate
          echo "🧹 부하테스트 데이터 정리 시작..."
          export DATABASE_URL="${{ secrets.DATABASE_URL }}"
          export LOCUST_TEST_USER_ID="${{ secrets.LOCUST_TEST_USER_ID }}"
          export FLASK_ENV=production
          export PYTHONPATH=.
          python cleanup_test_data.py --hours 2 || true
          echo "✅ 데이터 정리 완료"

